name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
      - work
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Ensure Pages uses GitHub Actions deployment
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.request('PATCH /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow',
              });
              core.info('GitHub Pages is configured to deploy from workflows.');
            } catch (error) {
              core.warning(`Could not update GitHub Pages settings automatically: ${error.message}`);
            }

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies (skip native postinstall scripts)
        run: npm ci --ignore-scripts

      - name: Build app
        env:
          VITE_BASE_PATH: ${{ github.event.repository.name == format('{0}.github.io', github.repository_owner) && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Validate built entrypoint
        run: |
          test -f dist/index.html
          if grep -q 'src/main.tsx' dist/index.html; then
            echo 'Build output still references src/main.tsx, deployment would fail on Pages.'
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
